<div class="monitor">

  <!-- ═══ HEADER ═══ -->
   <header class="header">
    <h1>BIENVENUE <span style="font-weight:300">SUR VOTRE</span><br><strong>BORNE MASSAR</strong></h1>

    <div class="header-logos">

      <!-- Navigo -->
       <div class="logo-box">
      <div class="logo-navigo">
        <div class="navigo-circle">M</div>
        <span>MASSAR</span>
      </div>
      </div>

      <!-- STS -->
       <div class="logo-box">
       <img src="assets/sts.png" alt="navigo" class="logo-img">
       </div>

      <!-- République tunisienne -->
       <div class="logo-box">
      <img src="assets/rup.png" alt="navigo" class="logo-img">
       </div>
    </div>
  </header>

  <!-- ═══ CORPS ═══ -->
  <main class="body">

    <!-- Salutation -->
    <div class="greeting">
      <div class="card-hand">
        <div class="navigo-card">
          <div class="card-name">navigo</div>
          <div class="card-chip"></div>
        </div>
        <div class="hand-body"></div>
      </div>

      <div class="greeting-text">
        <p class="bonjour">Bonjour !</p>
        <p class="question">Que souhaitez-vous faire aujourd'hui ?</p>
      </div>
    </div>

    <!-- Carte recharge -->
    <div class="options">
      <button class="btn-option teal recharge-card" (click)="goToOffers()">
        <svg viewBox="0 0 52 52" fill="none">
          <rect x="4" y="11" width="44" height="30" rx="5" fill="white" opacity="0.9"/>
          <rect x="4" y="20" width="44" height="7" fill="white" opacity="0.45"/>
          <path d="M30 34 L38 26 L30 18" stroke="rgba(0,100,80,0.75)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M38 26 H20 a7 7 0 0 1 0-14" stroke="rgba(0,100,80,0.75)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        </svg>

        <div class="btn-label">
          <span class="btn-title">RECHARGER<br>MON FORFAIT</span>
          <span class="btn-sub">Mois, Semaine, Jour</span>
        </div>
      </button>
    </div>

  </main>
</div>
