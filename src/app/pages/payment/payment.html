<div class="page">
  <h1>Paiement</h1>

  <div *ngIf="offer; else noOffer">
    <p><strong>Offre choisie :</strong> {{ offer.label }}</p>
    <p><strong>Durée :</strong> {{ offer.duration }}</p>
    <p><strong>Prix :</strong> {{ offer.price }} DT</p>
    <p><strong>Carte UID :</strong> {{ uid }}</p>

    <button (click)="validatePayment()" [disabled]="loading">
      {{ loading ? 'Activation en cours...' : 'Confirmer le paiement' }}
    </button>

    <p *ngIf="message">{{ message }}</p>
  </div>

  <ng-template #noOffer>
    <p>Aucune offre sélectionnée.</p>
  </ng-template>
</div>
